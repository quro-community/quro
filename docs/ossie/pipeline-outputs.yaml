semantic_model:
  - name: pipeline_outputs
    description: "Serialized TDA pipeline outputs — 9 JSON/JSONL artifacts across phases 2, 2.5, 3.5"
    ai_context:
      instructions: >
        Quro's TDA pipeline produces 9 intermediate and final artifact files under .quro_context/tda/.
        Phase 2 produces manifold state projections. Phase 2.5 produces anisotropic fields, edge weights,
        structural metrics, attractor-biased energy, offline energy, and symbol heat. Phase 3.5 produces
        semantic centers and codebase hologram. Additionally, 3 pickle cache files (adjacency, field_data,
        incoming_edges) speed up repeated pipeline runs. Note: cqe_reflections.jsonl and tda_mi_scores.json
        cited in README do NOT exist in the current data.
    datasets:
      - name: manifold_states
        source: "file://.quro_context/tda/phase2/manifold_states.jsonl (JSONL, 2.8MB, 3354 rows)"
        primary_key: [symbol]
        description: "Manifold state projections — per-symbol 5D embedding, topology, stability, and TDA role"
        fields:
          - name: symbol
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol}]
            description: "Symbol identifier"
          - name: manifold_position
            expression:
              dialects: [{dialect: ANSI_SQL, expression: manifold_position}]
            description: "Dict with embedding (float[5]) and norm"
          - name: topology
            expression:
              dialects: [{dialect: ANSI_SQL, expression: topology}]
            description: "Dict: centrality, betweenness, clustering_coeff"
          - name: stability
            expression:
              dialects: [{dialect: ANSI_SQL, expression: stability}]
            description: "Dict: tau_persistence, entry_variance, structural_noise"
          - name: role_type
            expression:
              dialects: [{dialect: ANSI_SQL, expression: role_type}]
            description: "TDA role: hub, leaf, sink, bridge"
          - name: role_confidence
            expression:
              dialects: [{dialect: ANSI_SQL, expression: role_confidence}]
            description: "Confidence score for role classification [0, 1]"
          - name: temporal_signature
            expression:
              dialects: [{dialect: ANSI_SQL, expression: temporal_signature}]
            description: "Dict: first_seen (epoch ms), frequency, burstiness"
          - name: field_role
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_role}]
            description: "Field role: not_critical_point, attractor, repeller, saddle"
          - name: field_magnitude
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_magnitude}]
            description: "Field magnitude"
          - name: mass
            expression:
              dialects: [{dialect: ANSI_SQL, expression: mass}]
            description: "Cognitive mass"
          - name: friction
            expression:
              dialects: [{dialect: ANSI_SQL, expression: friction}]
            description: "Traversal friction"
      - name: anisotropic_fields
        source: "file://.quro_context/tda/phase2_5/anisotropic_fields.jsonl (JSONL, 889KB, 3354 rows)"
        primary_key: [symbol]
        description: "Directional field vectors per symbol — forward direction, magnitudes, source diversity"
        fields:
          - name: symbol
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol}]
            description: "Symbol identifier"
          - name: forward_direction
            expression:
              dialects: [{dialect: ANSI_SQL, expression: forward_direction}]
            description: "3D forward direction vector (float[3])"
          - name: forward_magnitude
            expression:
              dialects: [{dialect: ANSI_SQL, expression: forward_magnitude}]
            description: "Forward energy magnitude"
          - name: backward_tension
            expression:
              dialects: [{dialect: ANSI_SQL, expression: backward_tension}]
            description: "Backward tension — upstream navigation resistance"
          - name: source_diversity
            expression:
              dialects: [{dialect: ANSI_SQL, expression: source_diversity}]
            description: "Shannon entropy of upstream callers [0, 1]"
          - name: in_degree
            expression:
              dialects: [{dialect: ANSI_SQL, expression: in_degree}]
            description: "Number of incoming edges"
          - name: out_degree
            expression:
              dialects: [{dialect: ANSI_SQL, expression: out_degree}]
            description: "Number of outgoing edges"
          - name: field_type
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_type}]
            description: "Field type: anisotropic (currently the only type)"
      - name: edge_weights
        source: "file://.quro_context/tda/phase2_5/edge_weights.json (JSON, 3MB, 13445 edges)"
        primary_key: [edge_key]
        description: "TDA-adjusted edge weights — keyed by src→dst, with type and dissipation"
        fields:
          - name: edge_key
            expression:
              dialects: [{dialect: ANSI_SQL, expression: edge_key}]
            description: "Composite key: src→dst (e.g., cat::entry_point→sym::main)"
          - name: src
            expression:
              dialects: [{dialect: ANSI_SQL, expression: src}]
            description: "Source symbol ID"
          - name: dst
            expression:
              dialects: [{dialect: ANSI_SQL, expression: dst}]
            description: "Destination symbol ID"
          - name: edge_type
            expression:
              dialects: [{dialect: ANSI_SQL, expression: edge_type}]
            description: "Edge type: dependency, composition"
          - name: weight
            expression:
              dialects: [{dialect: ANSI_SQL, expression: weight}]
            description: "Edge weight (0.5 default)"
          - name: dissipation
            expression:
              dialects: [{dialect: ANSI_SQL, expression: dissipation}]
            description: "Energy dissipation factor (0.4 default)"
      - name: structural_metrics
        source: "file://.quro_context/tda/phase2_5/structural_metrics.json (JSON, 643KB, 3015 symbols)"
        primary_key: [symbol_id]
        description: "Per-symbol structural graph metrics — degree, gravity, mass, complexity, friction"
        fields:
          - name: symbol_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol_id}]
            description: "Symbol identifier"
          - name: in_degree
            expression:
              dialects: [{dialect: ANSI_SQL, expression: in_degree}]
            description: "Incoming edge count"
          - name: out_degree
            expression:
              dialects: [{dialect: ANSI_SQL, expression: out_degree}]
            description: "Outgoing edge count"
          - name: gravity_score
            expression:
              dialects: [{dialect: ANSI_SQL, expression: gravity_score}]
            description: "Gravity score combining in/out-degree"
          - name: mass
            expression:
              dialects: [{dialect: ANSI_SQL, expression: mass}]
            description: "Normalized cognitive mass"
          - name: complexity
            expression:
              dialects: [{dialect: ANSI_SQL, expression: complexity}]
            description: "Cyclomatic complexity (always 1 in current data)"
          - name: nesting_depth
            expression:
              dialects: [{dialect: ANSI_SQL, expression: nesting_depth}]
            description: "Nesting depth (always 1 in current data)"
          - name: friction
            expression:
              dialects: [{dialect: ANSI_SQL, expression: friction}]
            description: "Traversal friction coefficient"
      - name: attractor_biased_energy
        source: "file://.quro_context/tda/phase2_5/attractor_biased_energy.json (JSON, 1.2MB, 3354 symbols)"
        primary_key: [symbol]
        description: "Attractor-biased energy states — Design 90/94 with bias injection and basin classification"
        fields:
          - name: symbol
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol}]
            description: "Symbol identifier"
          - name: original_total
            expression:
              dialects: [{dialect: ANSI_SQL, expression: original_total}]
            description: "Original total energy before bias"
          - name: attractor_bias
            expression:
              dialects: [{dialect: ANSI_SQL, expression: attractor_bias}]
            description: "Bias adjustment applied (0 if not a candidate)"
          - name: adjusted_total
            expression:
              dialects: [{dialect: ANSI_SQL, expression: adjusted_total}]
            description: "Total energy after bias adjustment"
          - name: is_attractor_candidate
            expression:
              dialects: [{dialect: ANSI_SQL, expression: is_attractor_candidate}]
            description: "Whether symbol meets attractor criteria"
          - name: bias_reason
            expression:
              dialects: [{dialect: ANSI_SQL, expression: bias_reason}]
            description: "Reason for bias: none, terminal_tag, utility_tag, basin_prize"
          - name: is_basin
            expression:
              dialects: [{dialect: ANSI_SQL, expression: is_basin}]
            description: "Whether symbol is in an energy basin"
      - name: offline_energy
        source: "file://.quro_context/tda/phase2_5/offline_energy.json (JSON, 1.3MB, 3354 symbols)"
        primary_key: [symbol]
        description: "Physics-based energy model — Design 85 field recalibration with potential, gravity, entropy"
        fields:
          - name: symbol
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol}]
            description: "Symbol identifier"
          - name: potential
            expression:
              dialects: [{dialect: ANSI_SQL, expression: potential}]
            description: "Potential energy component"
          - name: structural_gravity
            expression:
              dialects: [{dialect: ANSI_SQL, expression: structural_gravity}]
            description: "Structural gravity (degree-based)"
          - name: entropy_bonus
            expression:
              dialects: [{dialect: ANSI_SQL, expression: entropy_bonus}]
            description: "Entropy bonus from source diversity"
          - name: total
            expression:
              dialects: [{dialect: ANSI_SQL, expression: total}]
            description: "Total energy (potential + gravity + entropy)"
          - name: friction
            expression:
              dialects: [{dialect: ANSI_SQL, expression: friction}]
            description: "Friction coefficient"
          - name: mass
            expression:
              dialects: [{dialect: ANSI_SQL, expression: mass}]
            description: "Cognitive mass"
          - name: field_magnitude
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_magnitude}]
            description: "Field vector magnitude"
          - name: field_direction
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_direction}]
            description: "3D field direction vector"
          - name: field_role
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_role}]
            description: "Field role: not_critical_point, attractor, repeller, saddle"
      - name: symbol_heat
        source: "file://.quro_context/tda/phase2_5/symbol_heat.json (JSON, 691KB, 3015 symbols)"
        primary_key: [symbol_id]
        description: "Symbol heat scores from git log analysis (30-day window, 6 commits analyzed)"
        fields:
          - name: symbol_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol_id}]
            description: "Symbol identifier"
          - name: file_path
            expression:
              dialects: [{dialect: ANSI_SQL, expression: file_path}]
            description: "Source file path"
          - name: commits_30d
            expression:
              dialects: [{dialect: ANSI_SQL, expression: commits_30d}]
            description: "Number of commits touching this symbol in last 30 days"
          - name: lines_changed_30d
            expression:
              dialects: [{dialect: ANSI_SQL, expression: lines_changed_30d}]
            description: "Lines changed in last 30 days"
          - name: authors
            expression:
              dialects: [{dialect: ANSI_SQL, expression: authors}]
            description: "Number of distinct authors"
          - name: heat_score
            expression:
              dialects: [{dialect: ANSI_SQL, expression: heat_score}]
            description: "Composite heat score [0, 1]"
      - name: semantic_centers
        source: "file://.quro_context/tda/phase3_5/semantic_centers.json (JSON, 181KB, 10 centers C0-C9)"
        primary_key: [id]
        description: "Automatically discovered semantic centers from TDA Phase 3.5 partitioning"
        fields:
          - name: id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: id}]
            description: "Center identifier (C0–C9)"
          - name: size
            expression:
              dialects: [{dialect: ANSI_SQL, expression: size}]
            description: "Number of symbols in this center"
          - name: structure
            expression:
              dialects: [{dialect: ANSI_SQL, expression: structure}]
            description: "Dict: fan_in, fan_out, depth, cohesion"
          - name: topology
            expression:
              dialects: [{dialect: ANSI_SQL, expression: topology}]
            description: "Topology metadata dict"
          - name: stable_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: stable_id}]
            description: "Stable content hash for change detection"
          - name: members_hash
            expression:
              dialects: [{dialect: ANSI_SQL, expression: members_hash}]
            description: "SHA-256 hash of member symbols"
          - name: structural_cluster_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: structural_cluster_id}]
            description: "Structural coupling cluster ID (e.g., SC38, SC40)"
          - name: coupling_archetype
            expression:
              dialects: [{dialect: ANSI_SQL, expression: coupling_archetype}]
            description: "Coupling type: tight_coupling"
      - name: codebase_hologram
        source: "file://.quro_context/tda/phase3_5/codebase_hologram.json (JSON, 1.8KB)"
        primary_key: [model_id]
        description: "Global codebase structure hologram — condensed topological signature with field maps and navigation guidance"
        fields:
          - name: global_metrics
            expression:
              dialects: [{dialect: ANSI_SQL, expression: global_metrics}]
            description: "Dict: center_of_mass, dominant_axis, coherence, fragmentation, coupling_pressure"
          - name: field_maps
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_maps}]
            description: "Dict: density, curvature, stress per functional area"
          - name: architecture_state
            expression:
              dialects: [{dialect: ANSI_SQL, expression: architecture_state}]
            description: "Dict: coherence, fragmentation, coupling_pressure, overall_health"
          - name: navigation_guidance
            expression:
              dialects: [{dialect: ANSI_SQL, expression: navigation_guidance}]
            description: "Dict: recommended_entry_points, high_risk_zones, safe_refactor_zones"
      - name: pickle_caches
        source: "file://.quro_context/*.pkl (Pickle)"
        primary_key: [cache_name]
        description: "Binary pickle caches for pipeline performance — adjacency_cache.pkl (617KB), field_data_cache.pkl (332KB), incoming_edges_cache.pkl (331MB)"
        fields:
          - name: cache_name
            expression:
              dialects: [{dialect: ANSI_SQL, expression: cache_name}]
            description: "Cache file name"
          - name: content
            expression:
              dialects: [{dialect: ANSI_SQL, expression: content}]
            description: "Pickle-serialized Python object (not human-readable)"
    relationships:
      - name: pipeline_phase_order
        description: "Sequential dependency order of pipeline output files"
        source_dataset: manifold_states
        target_dataset: anisotropic_fields
        source_field: symbol
        target_field: symbol
        relationship_type: one_to_one
    metrics:
      - name: total_pipeline_artifacts
        description: "Number of JSON/JSONL artifact files"
        formula: "9 (7 JSON + 2 JSONL)"
      - name: total_cache_files
        description: "Number of pickle cache files"
        formula: "3"
      - name: total_rows_jsonl
        description: "Total rows across all JSONL files"
        formula: "6708 (3354 per file)"
