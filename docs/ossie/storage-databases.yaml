semantic_model:
  - name: storage_databases
    description: "Persistent database backends — SQLite symbol/graph storage and DuckDB TDA warehouse"
    ai_context:
      instructions: >
        Quro uses three SQLite databases and one DuckDB database for persistent storage.
        SQLite handles fast indexed lookups for the symbol registry, CQE semantic graph,
        and TDA analysis index. DuckDB serves as the analytics warehouse for TDA
        computation and exploration queries. All databases live under the project's
        .quro/ directory. See docs/centers/C0/docs/architecture.md for the data layer.
    datasets:
      - name: registry_db
        source: "file://registry.db (SQLite)"
        primary_key: [symbol_id]
        description: "Symbol registry — all code symbols with types, roles, intent tags, source locations, and TDA metadata"
        fields:
          - name: symbol_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol_id}]
            description: "Unique symbol identifier (e.g., sym::QuroV3Service::service::81)"
          - name: name
            expression:
              dialects: [{dialect: ANSI_SQL, expression: name}]
            description: "Short symbol name"
          - name: kind
            expression:
              dialects: [{dialect: ANSI_SQL, expression: kind}]
            description: "Symbol kind: function, class, method, variable, module"
          - name: file_path
            expression:
              dialects: [{dialect: ANSI_SQL, expression: file_path}]
            description: "Source file path (relative to project root)"
          - name: line_number
            expression:
              dialects: [{dialect: ANSI_SQL, expression: line_number}]
            description: "Line number in source file"
          - name: role
            expression:
              dialects: [{dialect: ANSI_SQL, expression: role}]
            description: "TDA role: TRANSIENT, CONVERTER, EMITTER, SINK, LEAF"
          - name: intent
            expression:
              dialects: [{dialect: ANSI_SQL, expression: intent}]
            description: "Semantic intent: util, core, init, error, test, entry"
          - name: center_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: center_id}]
            description: "Semantic center assignment (C0–C9)"
      - name: cqe_index_db
        source: "file://cqe_index.db (SQLite)"
        primary_key: [src_id, dst_id]
        description: "CQE semantic graph index — weighted directed edges with mutual information (MI) scores"
        fields:
          - name: src_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: src_id}]
            description: "Source symbol ID"
          - name: dst_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: dst_id}]
            description: "Destination symbol ID"
          - name: mi_score
            expression:
              dialects: [{dialect: ANSI_SQL, expression: mi_score}]
            description: "Mutual information score for the edge"
          - name: weight
            expression:
              dialects: [{dialect: ANSI_SQL, expression: weight}]
            description: "Combined edge weight (MI-adjusted)"
          - name: edge_type
            expression:
              dialects: [{dialect: ANSI_SQL, expression: edge_type}]
            description: "Edge type: CALL, IMPORT, INHERIT, CATEGORY"
      - name: tda_index_db
        source: "file://tda_index.db (SQLite)"
        primary_key: [symbol_id]
        description: "TDA analysis index — energy fields, curvature, persistence data per symbol"
        fields:
          - name: symbol_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol_id}]
            description: "Unique symbol identifier"
          - name: forward_mag
            expression:
              dialects: [{dialect: ANSI_SQL, expression: forward_mag}]
            description: "Forward energy magnitude"
          - name: backward_tension
            expression:
              dialects: [{dialect: ANSI_SQL, expression: backward_tension}]
            description: "Backward tension score"
          - name: ricci_curvature
            expression:
              dialects: [{dialect: ANSI_SQL, expression: ricci_curvature}]
            description: "Forman-Ricci curvature value"
          - name: tau_persistence
            expression:
              dialects: [{dialect: ANSI_SQL, expression: tau_persistence}]
            description: "Persistence across tau thresholds"
      - name: quro_tda_warehouse
        source: "file://quro_tda.duckdb (DuckDB)"
        primary_key: [symbol_id]
        description: "TDA analytics warehouse — OLAP-optimized storage for large-scale TDA computation and exploration"
        fields:
          - name: symbol_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol_id}]
            description: "Unique symbol identifier"
          - name: manifold_state
            expression:
              dialects: [{dialect: ANSI_SQL, expression: manifold_state}]
            description: "Manifold state projection vector (JSON array)"
          - name: anisotropic_field
            expression:
              dialects: [{dialect: ANSI_SQL, expression: anisotropic_field}]
            description: "Directional field vector per symbol (JSON array)"
          - name: field_direction
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_direction}]
            description: "Field direction: attractor, repeller, saddle"
          - name: cluster_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: cluster_id}]
            description: "TDA cluster assignment"
    relationships:
      - name: db_to_model
        description: "Mapping from physical databases to logical semantic models"
        source_dataset: registry_db
        target_dataset: cqe_index_db
        source_field: symbol_id
        target_field: src_id
        relationship_type: one_to_many
    metrics:
      - name: total_symbols
        description: "Total number of symbols in the registry"
        formula: "SELECT COUNT(*) FROM registry.symbols"
      - name: avg_mi_score
        description: "Average MI score across all CQE edges"
        formula: "SELECT AVG(mi_score) FROM cqe.edges"
