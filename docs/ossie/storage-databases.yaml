semantic_model:
  - name: storage_databases
    description: "Persistent database backends — SQLite symbol/graph storage and DuckDB TDA warehouse"
    ai_context:
      instructions: >
        Quro uses three SQLite databases and one DuckDB database under .quro_context/.
        registry.db (17.9MB) is the primary symbol registry with nodes, edges, aliases tables
        and TDA-enriched columns. cqe_index.db and tda_index.db are empty (schema-only placeholders).
        quro_tda.duckdb (3.2GB) is the analytics warehouse with 10 tables storing the full
        TDA pipeline state: nodes, adjacency, manifold states, anisotropic fields, energy states,
        events, semantic centers, and pipeline metadata.
    datasets:
      - name: registry_db
        source: "file://registry.db (SQLite, 17.9MB)"
        primary_key: [id]
        description: "SQLite symbol registry — master store for all indexed symbols, edges, and file aliases"
        fields:
          - name: id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: id}]
            description: "Unique identifier (e.g., sym::main or cat::entry_point)"
          - name: type
            expression:
              dialects: [{dialect: ANSI_SQL, expression: type}]
            description: "Node type: function, class, method, variable, module, category"
          - name: tags
            expression:
              dialects: [{dialect: ANSI_SQL, expression: tags}]
            description: "JSON array of classification tags"
          - name: metadata
            expression:
              dialects: [{dialect: ANSI_SQL, expression: metadata}]
            description: "JSON metadata object (e.g., category_type)"
          - name: energy_total
            expression:
              dialects: [{dialect: ANSI_SQL, expression: energy_total}]
            description: "Total TDA energy (potential + kinetic)"
          - name: field_role
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_role}]
            description: "Field role: not_critical_point, attractor, repeller, saddle"
          - name: field_magnitude
            expression:
              dialects: [{dialect: ANSI_SQL, expression: field_magnitude}]
            description: "Field vector magnitude"
          - name: mass
            expression:
              dialects: [{dialect: ANSI_SQL, expression: mass}]
            description: "Cognitive mass (TF-IDF derived)"
          - name: friction
            expression:
              dialects: [{dialect: ANSI_SQL, expression: friction}]
            description: "Traversal friction coefficient"
      - name: registry_edges
        source: "file://registry.db -> edges (SQLite)"
        primary_key: [id]
        description: "Directed edges between symbols (calls, imports, inheritance)"
        fields:
          - name: id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: id}]
            description: "Auto-increment edge ID"
          - name: src
            expression:
              dialects: [{dialect: ANSI_SQL, expression: src}]
            description: "Source symbol ID"
          - name: dst
            expression:
              dialects: [{dialect: ANSI_SQL, expression: dst}]
            description: "Destination symbol ID"
          - name: weight
            expression:
              dialects: [{dialect: ANSI_SQL, expression: weight}]
            description: "Edge weight"
          - name: kind
            expression:
              dialects: [{dialect: ANSI_SQL, expression: kind}]
            description: "Edge kind: calls, category, semantic_similarity, dependency, composition"
      - name: registry_aliases
        source: "file://registry.db -> aliases (SQLite)"
        primary_key: [symbol_id, path, line]
        description: "Symbol-to-file aliases mapping each symbol to its source file occurrences"
        fields:
          - name: symbol_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol_id}]
            description: "Symbol ID"
          - name: path
            expression:
              dialects: [{dialect: ANSI_SQL, expression: path}]
            description: "Absolute source file path"
          - name: line
            expression:
              dialects: [{dialect: ANSI_SQL, expression: line}]
            description: "Line number in source file"
          - name: kind
            expression:
              dialects: [{dialect: ANSI_SQL, expression: kind}]
            description: "Symbol kind: function, class, method"
          - name: signature
            expression:
              dialects: [{dialect: ANSI_SQL, expression: signature}]
            description: "Full signature/definition string"
      - name: cqe_index_db
        source: "file://cqe_index.db (SQLite, empty)"
        primary_key: [none]
        description: "CQE semantic graph index — schema-only placeholder (0 bytes), no data populated"
        fields:
          - name: status
            expression:
              dialects: [{dialect: ANSI_SQL, expression: status}]
            description: "Placeholder: database file exists but is empty"
      - name: tda_index_db
        source: "file://tda_index.db (SQLite, empty)"
        primary_key: [none]
        description: "TDA analysis index — schema-only placeholder (0 bytes), no data populated"
        fields:
          - name: status
            expression:
              dialects: [{dialect: ANSI_SQL, expression: status}]
            description: "Placeholder: database file exists but is empty"
      - name: quro_tda_warehouse
        source: "file://quro_tda.duckdb (DuckDB, 3.2GB)"
        primary_key: [symbol_id]
        description: "TDA analytics warehouse — 10 tables with full pipeline state: nodes, adjacency, manifolds, fields, energy, events, centers"
        fields:
          - name: symbol_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: symbol_id}]
            description: "Unique symbol identifier (tables: nodes, manifold_states, energy_states, anisotropic_fields)"
          - name: energy_total
            expression:
              dialects: [{dialect: ANSI_SQL, expression: energy_total}]
            description: "Total TDA energy (table: energy_states)"
          - name: embedding
            expression:
              dialects: [{dialect: ANSI_SQL, expression: embedding}]
            description: "5D manifold embedding vector (table: manifold_states)"
          - name: forward_direction
            expression:
              dialects: [{dialect: ANSI_SQL, expression: forward_direction}]
            description: "3D forward direction vector (table: anisotropic_fields)"
          - name: forward_magnitude
            expression:
              dialects: [{dialect: ANSI_SQL, expression: forward_magnitude}]
            description: "Forward field magnitude (table: anisotropic_fields)"
          - name: backward_tension
            expression:
              dialects: [{dialect: ANSI_SQL, expression: backward_tension}]
            description: "Backward tension score (table: anisotropic_fields)"
          - name: event_type
            expression:
              dialects: [{dialect: ANSI_SQL, expression: event_type}]
            description: "CQE query event type (table: events, 13M rows)"
          - name: center_id
            expression:
              dialects: [{dialect: ANSI_SQL, expression: center_id}]
            description: "Semantic center ID (table: semantic_centers)"
    relationships:
      - name: db_origin
        description: "Mapping from DuckDB warehouse tables to the file-based JSON outputs they aggregate"
        source_dataset: quro_tda_warehouse
        target_dataset: registry_db
        source_field: symbol_id
        target_field: id
        relationship_type: one_to_one
    metrics:
      - name: total_symbols
        description: "Total nodes in registry.db"
        formula: "SELECT COUNT(*) FROM registry.nodes"
      - name: total_registry_edges
        description: "Total edges in registry.db"
        formula: "SELECT COUNT(*) FROM registry.edges"
      - name: duckdb_total_rows
        description: "Total rows across all DuckDB tables"
        formula: "~13.4M (dominated by events: 13M)"
